name: Laravel 
on: 
  push:
    branches: [main] 
  pull_request: 
    branches: [main] 
       
jobs: 
  deploy: 
    runs-on: ubuntu-latest 
    steps: 
      - name: Checkout 
        uses: actions/checkout@v4 
      
      - name: Setup PHP
        uses: shivammathur/setup-php@v2 
        with: 
          php-version: 8.2
          extensions: mbstring, pdo, pdo_mysql, zip, fileinfo, curl, xml
      
      - name: Install Composer dependencies
        uses: ramsey/composer-install@v2 
        with: 
          composer-options: "--ignore-platform-reqs"
      
      - name: Install rsync
        run: sudo apt-get update && sudo apt-get install -y rsync
      
      - name: Debug - List files
        run: |
          echo "Current directory: $(pwd)"
          echo "Files in root:"
          ls -la
          echo "Artisan file exists:"
          ls -la artisan || echo "artisan not found"
      
      - name: Sync ke Server
        env: 
          DEST: "USERNAME@IP_SERVER_ANDA:~/PATH_TUJUAN/"  # ← GANTI INI
        run: | 
          echo "${{secrets.DEPLOY_KEY}}" > ~/deploy_key 
          chmod 600 ~/deploy_key 
          rsync -chav --delete --verbose \
            -e 'ssh -i ~/deploy_key -o StrictHostKeyChecking=no' \
            --exclude deploy_key \
            --exclude .git/ \
            --exclude .github/ \
            --exclude storage/ \
            --exclude .env \
            --exclude vendor/ \
            "${{ github.workspace }}/" "${{env.DEST}}"
