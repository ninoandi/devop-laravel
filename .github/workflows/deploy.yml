name: Laravel 
on: 
  push:
    branches: [main] 
  pull_request: 
    branches: [main] 
       
jobs: 
  deploy: 
    runs-on: ubuntu-latest 
    steps: 
      - name: Checkout 
        uses: actions/checkout@v4 
      
      - name: Setup PHP
        uses: shivammathur/setup-php@v2 
        with: 
          php-version: 8.2
          extensions: mbstring, pdo, pdo_mysql, zip, fileinfo, curl, xml
      
      - name: Install Composer dependencies
        uses: ramsey/composer-install@v2 
        with: 
          composer-options: "--ignore-platform-reqs"
      
      - name: Simulasi Deploy
        run: |
          echo "========================================="
          echo "✅ SIMULASI DEPLOY BERHASIL"
          echo "========================================="
          echo "File siap di-deploy ke server"
          echo "Total files: $(find . -type f | wc -l)"
          echo "========================================="
